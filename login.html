<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Smart Livestock System</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .forgot-link {
      color: var(--primary);
      text-decoration: none;
      font-size: 13px;
      font-weight: 600;
      float: right;
    }
    .forgot-link:hover {
      text-decoration: underline;
    }
    .label-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      margin-bottom: 8px;
    }
    .label-row label {
      margin-bottom: 0 !important;
    }
    .login-footer-text {
      color: rgba(0, 0, 0, 0.769);
      font-size: 12px;
      margin-top: 24px;
      text-align: center;
    }
    .seed-btn-container {
      margin-top: 20px;
      border-top: 1px dashed var(--border-color);
      padding-top: 16px;
    }
    .btn-seed {
      background-color: #f1f5f9;
      color: var(--text-muted);
      border: 1px solid var(--border-color);
      font-size: 12px;
      padding: 8px 16px;
      border-radius: var(--border-radius-sm);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      width: 100%;
      justify-content: center;
      transition: all var(--transition-speed);
    }
    .btn-seed:hover {
      background-color: #e2e8f0;
      color: var(--text-main);
    }
  </style>
</head>
<body class="login-body">

  <div>
    <div class="login-card">
      <img src="assets/icons/logo.png" alt="Smart Livestock Logo" class="login-logo" onerror="this.src='assets/icons/profile.png'">
      <h2 style="color: var(--primary-dark); font-weight: 700; margin-bottom: 4px;">smartlivestock</h2>
      <p style="margin-bottom: 24px;">Precision IoT System Login</p>
      
      <form id="loginForm">
        <div class="form-group" style="text-align: left;">
          <label for="email">Email Address</label>
          <div class="input-icon-group">
            <img src="assets/icons/email.png" alt="Email Icon">
            <input type="email" id="email" class="form-control" required placeholder="manager@farm.com" value="manager@farm.com">
          </div>
        </div>
        
        <div class="form-group" style="text-align: left;">
          <div class="label-row">
            <label for="password">Password</label>
            <a href="#" class="forgot-link">Forgot password?</a>
          </div>
          <div class="input-icon-group">
            <img src="assets/icons/profile.png" alt="Profile/Password Icon">
            <input type="password" id="password" class="form-control" required placeholder="••••••••" value="123456">
          </div>
        </div>
        
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px;">Masuk</button>
      </form>
    </div>
    
    <div class="login-footer-text">
      © 2026 Smart Livestock Systems v2.4.0
    </div>
  </div>

  <script type="module" src="js/auth.js"></script>
  <script type="module">
    import { jalankanSeederLengkap } from "./js/dummy-seeder.js";
    // jalankanSeederLengkap();
  </script>
</body>
</html>
